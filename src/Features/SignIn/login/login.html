<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Login</title>
</head>
<body class="bg-gray-50">

  <div class="min-h-screen flex">
    
    <!-- Left Side - Hero Image -->
    <div class="hidden lg:flex lg:w-1/2 relative">
      <img src="../Assets/Hero-bg.png" alt="hero girl" class="absolute inset-0 w-full h-full object-cover">
      <div class="absolute inset-0 bg-black/40"></div>
    </div>

    <!-- Right Side - Login Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
      <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 border-gray-100">
        
        <h1 class="text-3xl font-bold text-gray-900">Welcome<br>Back To The Hunt</h1>
        <p class="text-sm text-gray-500 mt-2">Pick Up Where You Left Off And Keep Earning With New Bounties</p>

        <!-- OAuth Buttons -->
        <div class="mt-6 space-y-3">
          <button class="w-full flex items-center justify-center gap-3 border-gray-300 rounded-lg py-2.5 hover:bg-gray-50">
            <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
            Sign In With Google
          </button>
          
          <button class="w-full flex items-center justify-center gap-3 border-gray-300 rounded-lg py-2.5 hover:bg-gray-50">
  <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="w-5 h-5" alt="Apple">
  Sign In With Apple
</button>
        </div>

        <div class="flex items-center my-6">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="px-3 text-sm text-gray-500">Or Sign In With</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Email Form -->
        <form class="space-y-4">
          <input type="email" placeholder="Email" class="w-full px-4 py-2.5 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
          
          <div class="relative">
  <input id="password" type="password" placeholder="Password" 
    class="w-full px-4 py-2.5 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
  
  <button type="button" id="togglePassword" 
    class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
    👁
  </button>
</div>

          <div class="text-right">
            <a href="#" class="text-sm text-green-600 hover:underline">Forgot Password?</a>
          </div>

          <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700">
            Login
          </button>
        </form>

        <p class="text-center text-sm text-gray-600 mt-6">
          Not A Bounty Hunter? <a href="#" class="text-green-600 font-semibold hover:underline">Sign Up</a>
        </p>
      </div>
    </div>
  </div>

  <script>
  const passwordInput = document.getElementById('password');
  const toggleBtn = document.getElementById('togglePassword');

  toggleBtn.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    toggleBtn.textContent = isPassword ? '🙈' : '👁'; // changes to monkey when visible
  });
</script>
</body>
</html>
